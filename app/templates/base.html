<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Monitor{% endblock %}</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0b0e14;
            color: #e2e8f0;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Header - sticky, glassmorphism */
        header {
            position: sticky;
            top: 0;
            height: 56px;
            background: rgba(11, 14, 20, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 1000;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #e2e8f0;
        }
        .logo span { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
        .header-actions { display: flex; align-items: center; gap: 8px; }

        /* Buttons - consistent system */
        .btn {
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            min-height: 36px;
            font-family: inherit;
        }
        .btn:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; box-shadow: 0 2px 8px rgba(59,130,246,0.25); }
        .btn-ghost { background: transparent; border: 1px solid #1e293b; color: #94a3b8; }
        .btn-ghost:hover { border-color: #334155; color: #e2e8f0; background: rgba(255,255,255,0.03); }
        .btn-success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.2); color: #34d399; }
        .btn-success:hover { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.35); }

        /* Container */
        .container { max-width: 960px; margin: 0 auto; padding: 24px 24px 48px; }

        /* Links */
        a { color: #60a5fa; text-decoration: none; }
        a:hover { color: #93bbfd; }
        a:focus-visible { outline: 2px solid #60a5fa; outline-offset: 2px; border-radius: 2px; }

        /* Flash messages */
        @keyframes fadeOut {
            0%, 80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-4px); }
        }
        .flash-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            font-size: 13px;
            animation: fadeOut 5s forwards;
        }

        /* Loading overlay */
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 14, 20, 0.9); backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px); z-index: 9999;
            justify-content: center; align-items: center; flex-direction: column; gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loading-bar-wrap { width: 280px; height: 3px; background: #1e293b; border-radius: 3px; overflow: hidden; }
        .loading-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #3b82f6, #10b981); border-radius: 3px; transition: width 0.3s ease; }
        .loading-text { color: #94a3b8; font-size: 14px; font-weight: 500; }
        .loading-sub { color: #475569; font-size: 12px; margin-top: -12px; }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .loading-icon { animation: pulse-glow 2s ease-in-out infinite; }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 0 16px; height: 52px; }
            .container { padding: 16px 16px 32px; }
            .logo span { font-size: 14px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <a href="/" class="logo" aria-label="Ir para página inicial">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"/>
            </svg>
            <span>Flight Monitor</span>
        </a>
        <div class="header-actions">
            {% block header_actions %}
            <a href="/groups/create" class="btn btn-primary">+ Novo Grupo</a>
            {% endblock %}
        </div>
    </header>
    <div class="container">
        {% if flash_message %}
        <div class="flash-message" role="status">{{ flash_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <div class="loading-overlay" id="loading-overlay" role="alert" aria-live="polite">
        <svg class="loading-icon" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"/>
        </svg>
        <div class="loading-text" id="loading-text">Buscando voos...</div>
        <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
        <div class="loading-sub" id="loading-sub">Consultando Google Flights</div>
    </div>

    <script>
    (function() {
        var form = document.getElementById('polling-form');
        if (!form) return;
        var msgs = [
            {at:0,t:'Iniciando busca...',s:'Conectando com Google Flights'},
            {at:10,t:'Buscando voos...',s:'Verificando rotas configuradas'},
            {at:25,t:'Buscando voos...',s:'Comparando preços entre companhias'},
            {at:45,t:'Analisando preços...',s:'Calculando histórico e tendências'},
            {at:65,t:'Detectando sinais...',s:'Verificando oportunidades de compra'},
            {at:80,t:'Quase lá...',s:'Salvando dados coletados'},
            {at:90,t:'Finalizando...',s:'Preparando resultados'}
        ];
        form.addEventListener('submit', function() {
            var o=document.getElementById('loading-overlay'),b=document.getElementById('loading-bar'),
                t=document.getElementById('loading-text'),s=document.getElementById('loading-sub');
            o.classList.add('active');
            var p=0;
            setInterval(function(){
                p+=Math.random()*3+0.5; if(p>95)p=95; b.style.width=p+'%';
                for(var i=msgs.length-1;i>=0;i--){if(p>=msgs[i].at){t.textContent=msgs[i].t;s.textContent=msgs[i].s;break;}}
            },300);
        });
    })();
    </script>
</body>
</html>
