<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Monitor{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f1119;
            color: #f1f5f9;
            min-height: 100vh;
        }
        header {
            position: sticky;
            top: 0;
            height: 64px;
            background: rgba(15, 17, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 1000;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #f1f5f9;
        }
        .logo svg { opacity: 0.9; }
        .logo span {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-primary {
            background: #3b82f6;
            border: none;
            color: #FFFFFF;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 36px;
        }
        .btn-primary:hover {
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-primary:active { transform: scale(0.96); }
        .btn-secondary {
            background: #10b981;
            border: none;
            color: #FFFFFF;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 36px;
            font-family: inherit;
        }
        .btn-secondary:hover {
            background: #059669;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .btn-secondary:active { transform: scale(0.96); }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 17, 25, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 24px;
        }
        .loading-overlay.active { display: flex; }
        .loading-bar-container {
            width: 320px;
            height: 4px;
            background: #2d3748;
            border-radius: 4px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .loading-text {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
        }
        .loading-subtext {
            color: #4a5568;
            font-size: 12px;
            margin-top: -16px;
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .loading-icon {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 32px 32px;
        }
        a { color: #60a5fa; }
        a:hover { color: #93bbfd; }
        @keyframes fadeOut {
            0%, 80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-8px); }
        }
        .flash-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-weight: 500;
            font-size: 14px;
            animation: fadeOut 5s forwards;
        }
        @media (max-width: 768px) {
            header { padding: 0 16px; }
            .container { padding: 16px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <a href="/" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"/>
            </svg>
            <span>Flight Monitor</span>
        </a>
        <div class="header-actions">
            {% block header_actions %}
            <a href="/groups/create" class="btn-primary">+ Novo Grupo</a>
            {% endblock %}
        </div>
    </header>
    <div class="container">
        {% if flash_message %}
        <div class="flash-message">{{ flash_message }}</div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <div class="loading-overlay" id="loading-overlay">
        <svg class="loading-icon" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.3c.4-.2.6-.6.5-1.1z"/>
        </svg>
        <div class="loading-text" id="loading-text">Buscando voos...</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="loading-subtext" id="loading-subtext">Consultando Google Flights</div>
    </div>

    <script>
    (function() {
        const form = document.getElementById('polling-form');
        if (!form) return;

        const messages = [
            { at: 0, text: 'Iniciando busca...', sub: 'Conectando com Google Flights' },
            { at: 10, text: 'Buscando voos...', sub: 'Verificando rotas configuradas' },
            { at: 25, text: 'Buscando voos...', sub: 'Comparando preços entre companhias' },
            { at: 45, text: 'Analisando preços...', sub: 'Calculando histórico e tendências' },
            { at: 65, text: 'Detectando sinais...', sub: 'Verificando oportunidades de compra' },
            { at: 80, text: 'Quase lá...', sub: 'Salvando dados coletados' },
            { at: 90, text: 'Finalizando...', sub: 'Preparando resultados' },
        ];

        form.addEventListener('submit', function() {
            const overlay = document.getElementById('loading-overlay');
            const bar = document.getElementById('loading-bar');
            const text = document.getElementById('loading-text');
            const subtext = document.getElementById('loading-subtext');

            overlay.classList.add('active');

            let progress = 0;
            const interval = setInterval(function() {
                progress += Math.random() * 3 + 0.5;
                if (progress > 95) progress = 95;
                bar.style.width = progress + '%';

                for (let i = messages.length - 1; i >= 0; i--) {
                    if (progress >= messages[i].at) {
                        text.textContent = messages[i].text;
                        subtext.textContent = messages[i].sub;
                        break;
                    }
                }
            }, 300);
        });
    })();
    </script>
</body>
</html>
