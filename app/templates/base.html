<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flight Monitor{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; }
        nav { background: #1e293b; padding: 1rem 2rem; display: flex; gap: 1.5rem; align-items: center; }
        nav a { color: white; text-decoration: none; font-weight: 500; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        @keyframes fadeOut {
            0%, 80% { opacity: 1; }
            100% { opacity: 0; display: none; }
        }
        .flash-message { animation: fadeOut 5s forwards; }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .card-grid { grid-template-columns: 1fr !important; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/">Grupos</a>
        <a href="/groups/create">Novo Grupo</a>
    </nav>
    <div class="container">
        {% if flash_message %}
        <div class="flash-message" style="background: #22c55e; color: white; padding: 0.75rem 1.5rem; border-radius: 6px; margin-bottom: 1rem; font-weight: 500;">
            {{ flash_message }}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
