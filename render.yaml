services:
  - type: web
    name: flight-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --forwarded-allow-ips="*"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.12"
      - key: DATABASE_URL
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_RECIPIENT
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET_KEY
        sync: false
      - key: APP_BASE_URL
        sync: false
